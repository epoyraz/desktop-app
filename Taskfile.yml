version: "3"

# Top-level dev entrypoints. Run `task` to see the list.
# Most tasks proxy to npm scripts inside my-app/ so both `task <x>` and
# `cd my-app && npm run <x>` do the same thing.

vars:
  APP_DIR: my-app

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # ----- launch -------------------------------------------------------------

  start:
    desc: Start the browser against the real user profile (default)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm start

  start:fresh:
    desc: Start against a throwaway userData dir (preserves real profile)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run start:fresh

  start:onboarding:
    desc: Start with the onboarding window forced open (fresh userData, real profile untouched)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run start:onboarding

  reset:onboarding:
    desc: Delete account.json so the next launch retriggers onboarding (keeps keychain + session)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run start:reset-onboarding

  start:settings:
    desc: Start in SETTINGS_STANDALONE mode (shell + settings window for design review)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run dev:settings

  # ----- quality gates ------------------------------------------------------

  lint:
    desc: Run eslint across the app
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run lint

  typecheck:
    desc: tsc --noEmit
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run typecheck

  test:
    desc: Vitest unit/integration suite
    dir: "{{.APP_DIR}}"
    cmds:
      - npm test

  e2e:
    desc: Playwright-Electron e2e suite
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run e2e

  visual:
    desc: Visual QA — capture screenshots + diff against references
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run visual:qa

  qa:
    desc: Full QA — lint + typecheck + test
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run qa

  # ----- packaging ----------------------------------------------------------

  package:
    desc: Build an unpackaged app (electron-forge package)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run package

  make:
    desc: Build platform installers (electron-forge make)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run make
