version: "3"

vars:
  APP_DIR: my-app

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  up:
    desc: Install deps and start the app
    dir: "{{.APP_DIR}}"
    cmds:
      - yarn install
      - npm start

  reset:onboarding:
    desc: Delete account.json so the next launch retriggers onboarding
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run start:reset-onboarding

  lint:
    desc: Run eslint
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run lint

  typecheck:
    desc: tsc --noEmit
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run typecheck

  package:
    desc: Build an unpackaged app (electron-forge package)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run package

  make:
    desc: Build platform installers (electron-forge make)
    dir: "{{.APP_DIR}}"
    cmds:
      - npm run make
