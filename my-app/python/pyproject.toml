[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
  "-ra",
  "--strict-markers",
  "--strict-config",
  "--tb=short",
]
markers = [
  "slow: tests that take >1s",
  "integration: tests that hit real external systems",
]
filterwarnings = [
  "error",
  "ignore::DeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["agent"]
omit = [
  "agent/__init__.py",
  "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["harnessless", "dist", "build"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
]
ignore = [
  "E501",  # line length handled by formatter
  "B008",  # function calls in argument defaults (common in FastAPI-style code)
  "UP007", # codebase prefers explicit Union[...] over X | Y; revisit later
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_optional = true
check_untyped_defs = true
exclude = ["harnessless/", "tests/", "build/", "dist/"]

[[tool.mypy.overrides]]
module = ["anthropic.*", "websockets.*"]
ignore_missing_imports = true
