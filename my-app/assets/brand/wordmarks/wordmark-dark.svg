<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 64"
  width="420"
  height="64"
  role="img"
  aria-label="Agentic Browser wordmark — dark variant"
>
  <title>Agentic Browser</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&amp;display=swap');
      .wordmark-text {
        font-family: 'Instrument Serif', Georgia, 'Times New Roman', serif;
        font-size: 38px;
        font-weight: 400;
        letter-spacing: -0.5px;
      }
      .wordmark-dot {
        font-family: 'Geist', 'SF Pro Display', system-ui, sans-serif;
        font-size: 38px;
        font-weight: 400;
      }
    </style>
  </defs>

  <!-- Mascot face glyph — compact icon left of wordmark -->
  <!-- Head -->
  <rect x="0" y="10" width="44" height="44" rx="14" ry="14" fill="#7fb3d0"/>
  <!-- Eye left -->
  <ellipse cx="14" cy="30" rx="5" ry="6" fill="#f2f0ee"/>
  <circle  cx="15" cy="31" r="3" fill="#1a1a2e"/>
  <circle  cx="16.5" cy="29" r="1.2" fill="#ffffff" opacity="0.9"/>
  <!-- Eye right -->
  <ellipse cx="30" cy="30" rx="5" ry="6" fill="#f2f0ee"/>
  <circle  cx="31" cy="31" r="3" fill="#1a1a2e"/>
  <circle  cx="32.5" cy="29" r="1.2" fill="#ffffff" opacity="0.9"/>
  <!-- Smile -->
  <path d="M 15 40 Q 22 46 29 40" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Neon accent dot -->
  <circle cx="40" cy="13" r="5" fill="#c8f135"/>

  <!-- Wordmark text -->
  <text x="56" y="49" class="wordmark-text" fill="#f0f0f2">Agentic</text>

  <!-- Separator — thin vertical line with accent color -->
  <line x1="224" y1="14" x2="224" y2="50" stroke="#c8f135" stroke-width="1.5" opacity="0.6"/>

  <!-- "Browser" in lighter weight -->
  <text x="234" y="49" class="wordmark-text" fill="#8a8f98">Browser</text>
</svg>
