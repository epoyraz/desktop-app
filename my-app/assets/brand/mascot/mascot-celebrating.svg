<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 280"
  width="240"
  height="280"
  role="img"
  aria-label="Companion mascot — celebrating pose"
>
  <title>Companion — Celebrating</title>

  <defs>
    <radialGradient id="cel-sheen" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#b0d4e8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7fb3d0" stop-opacity="0"/>
    </radialGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .cel-bounce {
          animation: cel-bounce 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate;
          transform-origin: 100px 140px;
        }
        @keyframes cel-bounce {
          0%   { transform: translateY(0px) rotate(-2deg) scaleY(1); }
          100% { transform: translateY(-14px) rotate(2deg) scaleY(1.04); }
        }
        .cel-shadow {
          animation: cel-shadow 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate;
          transform-origin: 100px 270px;
        }
        @keyframes cel-shadow {
          0%   { transform: scaleX(1);    opacity: 0.30; }
          100% { transform: scaleX(0.72); opacity: 0.14; }
        }
        .cel-burst-1 { animation: cel-burst 1.1s ease-out infinite 0s; transform-origin: 56px 56px; }
        .cel-burst-2 { animation: cel-burst 1.1s ease-out infinite 0.18s; transform-origin: 170px 44px; }
        .cel-burst-3 { animation: cel-burst 1.1s ease-out infinite 0.36s; transform-origin: 32px 110px; }
        .cel-burst-4 { animation: cel-burst 1.1s ease-out infinite 0.54s; transform-origin: 194px 110px; }
        @keyframes cel-burst {
          0%   { opacity: 0; transform: scale(0.4); }
          25%  { opacity: 1; transform: scale(1); }
          100% { opacity: 0; transform: scale(1.4) rotate(60deg); }
        }
      }
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse class="cel-shadow" cx="100" cy="270" rx="44" ry="9" fill="#1a1a2e" opacity="0.30"/>

  <!-- Celebration bursts — neon accents -->
  <g class="cel-burst-1">
    <line x1="56" y1="44" x2="56" y2="32" stroke="#c8f135" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="44" x2="66" y2="36" stroke="#c8f135" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="44" x2="44" y2="36" stroke="#c8f135" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="44" x2="68" y2="44" stroke="#c8f135" stroke-width="2" stroke-linecap="round"/>
    <line x1="56" y1="44" x2="44" y2="44" stroke="#c8f135" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="cel-burst-2">
    <line x1="170" y1="44" x2="170" y2="32" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="170" y1="44" x2="180" y2="36" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="170" y1="44" x2="158" y2="36" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="170" y1="44" x2="182" y2="44" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="cel-burst-3">
    <circle cx="32" cy="110" r="4" fill="#c8f135" opacity="0.8"/>
    <circle cx="24" cy="102" r="2.5" fill="#c8f135" opacity="0.6"/>
    <circle cx="40" cy="100" r="2" fill="#c8f135" opacity="0.5"/>
  </g>
  <g class="cel-burst-4">
    <circle cx="194" cy="110" r="4" fill="#60a5fa" opacity="0.8"/>
    <circle cx="202" cy="102" r="2.5" fill="#60a5fa" opacity="0.6"/>
    <circle cx="186" cy="100" r="2" fill="#60a5fa" opacity="0.5"/>
  </g>

  <g class="cel-bounce">
    <!-- Body -->
    <rect x="30" y="68" width="140" height="152" rx="54" ry="54" fill="#7fb3d0"/>
    <rect x="30" y="68" width="140" height="152" rx="54" ry="54" fill="url(#cel-sheen)"/>
    <ellipse cx="130" cy="188" rx="44" ry="30" fill="#5a9abf" opacity="0.25" transform="rotate(-8 130 188)"/>

    <!-- Eyes — wide open, happy squint -->
    <ellipse cx="76" cy="116" rx="17" ry="20" fill="#f2f0ee"/>
    <ellipse cx="124" cy="116" rx="17" ry="20" fill="#f2f0ee"/>
    <!-- Pupils shifted slightly up (excited/happy) -->
    <circle cx="79" cy="112" r="10" fill="#1a1a2e"/>
    <circle cx="127" cy="112" r="10" fill="#1a1a2e"/>
    <!-- Big shines — larger for excitement -->
    <circle cx="83" cy="108" r="4.5" fill="#ffffff" opacity="0.90"/>
    <circle cx="131" cy="108" r="4.5" fill="#ffffff" opacity="0.90"/>

    <!-- Happy arc smile — large, exuberant -->
    <path d="M 78 152 Q 100 178 122 152" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.65"/>
    <!-- Cheek blush marks -->
    <ellipse cx="68" cy="146" rx="10" ry="5" fill="#ff9eb5" opacity="0.35" transform="rotate(-10 68 146)"/>
    <ellipse cx="132" cy="146" rx="10" ry="5" fill="#ff9eb5" opacity="0.35" transform="rotate(10 132 146)"/>

    <!-- Left arm — raised high, celebratory wave -->
    <ellipse cx="18" cy="108" rx="13" ry="26" fill="#6aa8c8" transform="rotate(50 18 108)"/>
    <ellipse cx="8" cy="86" rx="10" ry="8" fill="#6aa8c8" transform="rotate(30 8 86)"/>

    <!-- Right arm — raised high opposite side -->
    <ellipse cx="182" cy="108" rx="13" ry="26" fill="#6aa8c8" transform="rotate(-50 182 108)"/>
    <ellipse cx="192" cy="86" rx="10" ry="8" fill="#6aa8c8" transform="rotate(-30 192 86)"/>

    <!-- Feet — slight jump split -->
    <ellipse cx="72" cy="228" rx="22" ry="11" fill="#6aa8c8" transform="rotate(-8 72 228)"/>
    <ellipse cx="128" cy="228" rx="22" ry="11" fill="#6aa8c8" transform="rotate(8 128 228)"/>
  </g>
</svg>
