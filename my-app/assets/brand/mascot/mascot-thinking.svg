<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 260"
  width="240"
  height="260"
  role="img"
  aria-label="Companion mascot — thinking pose"
>
  <title>Companion — Thinking</title>

  <defs>
    <radialGradient id="think-sheen" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#b0d4e8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7fb3d0" stop-opacity="0"/>
    </radialGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .think-float {
          animation: think-float 4s ease-in-out infinite;
          transform-origin: 100px 130px;
        }
        @keyframes think-float {
          0%, 100% { transform: translateY(0px) rotate(0deg); }
          30%       { transform: translateY(-4px) rotate(-1.5deg); }
          70%       { transform: translateY(-2px) rotate(1deg); }
        }
        .think-dot-1 { animation: think-dot 1.4s ease-in-out infinite 0s; }
        .think-dot-2 { animation: think-dot 1.4s ease-in-out infinite 0.22s; }
        .think-dot-3 { animation: think-dot 1.4s ease-in-out infinite 0.44s; }
        @keyframes think-dot {
          0%, 100% { opacity: 0.25; transform: scale(0.75); }
          50%       { opacity: 1;    transform: scale(1); }
        }
        .think-shadow {
          animation: think-shadow 4s ease-in-out infinite;
          transform-origin: 100px 252px;
        }
        @keyframes think-shadow {
          0%, 100% { transform: scaleX(1);    opacity: 0.30; }
          50%       { transform: scaleX(0.88); opacity: 0.18; }
        }
      }
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse class="think-shadow" cx="100" cy="252" rx="42" ry="9" fill="#1a1a2e" opacity="0.30"/>

  <!-- Thinking bubble -->
  <circle cx="178" cy="56" r="26" fill="#22222a" stroke="#3a3a44" stroke-width="1.5" opacity="0.92"/>
  <!-- Bubble tail dots -->
  <circle cx="162" cy="78" r="6" fill="#22222a" stroke="#3a3a44" stroke-width="1.5" opacity="0.88"/>
  <circle cx="152" cy="90" r="3.5" fill="#22222a" stroke="#3a3a44" stroke-width="1" opacity="0.75"/>

  <!-- Thinking dots inside bubble -->
  <g>
    <circle class="think-dot-1" cx="166" cy="56" r="4" fill="#c8f135"/>
    <circle class="think-dot-2" cx="178" cy="56" r="4" fill="#c8f135"/>
    <circle class="think-dot-3" cx="190" cy="56" r="4" fill="#c8f135"/>
  </g>

  <g class="think-float">
    <!-- Body — tilted slightly left (looking up/thinking) -->
    <rect x="30" y="56" width="140" height="152" rx="54" ry="54" fill="#7fb3d0" transform="rotate(-3 100 132)"/>
    <rect x="30" y="56" width="140" height="152" rx="54" ry="54" fill="url(#think-sheen)" transform="rotate(-3 100 132)"/>
    <ellipse cx="130" cy="178" rx="44" ry="30" fill="#5a9abf" opacity="0.25" transform="rotate(-11 130 178)"/>

    <!-- Left eye — looking up-right (raised) -->
    <ellipse cx="74" cy="112" rx="16" ry="14" fill="#f2f0ee" transform="rotate(-3 74 112)"/>
    <!-- Right eye — looking up-right -->
    <ellipse cx="122" cy="108" rx="16" ry="15" fill="#f2f0ee" transform="rotate(-3 122 108)"/>

    <!-- Pupils shifted up-right (thinking gaze) -->
    <circle cx="78" cy="109" r="9" fill="#1a1a2e"/>
    <circle cx="126" cy="104" r="9" fill="#1a1a2e"/>

    <!-- Shines -->
    <circle cx="81" cy="106" r="3.5" fill="#ffffff" opacity="0.88"/>
    <circle cx="129" cy="101" r="3.5" fill="#ffffff" opacity="0.88"/>

    <!-- Mouth — pursed/neutral, slightly asymmetric (in thought) -->
    <path d="M 84 142 Q 100 148 114 140" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- Left arm — raised, hand to chin gesture -->
    <ellipse cx="24" cy="138" rx="14" ry="22" fill="#6aa8c8" transform="rotate(30 24 138)"/>
    <!-- Right arm — raised to chin -->
    <ellipse cx="176" cy="118" rx="14" ry="24" fill="#6aa8c8" transform="rotate(-40 176 118)"/>
    <!-- "Chin touch" extension -->
    <ellipse cx="158" cy="100" rx="10" ry="8" fill="#6aa8c8" transform="rotate(-20 158 100)"/>

    <!-- Feet -->
    <ellipse cx="78" cy="214" rx="22" ry="11" fill="#6aa8c8" transform="rotate(-3 78 214)"/>
    <ellipse cx="122" cy="214" rx="22" ry="11" fill="#6aa8c8" transform="rotate(-3 122 214)"/>
  </g>
</svg>
