<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 260"
  width="200"
  height="260"
  role="img"
  aria-label="Companion mascot — error pose"
>
  <title>Companion — Error</title>

  <defs>
    <radialGradient id="err-sheen" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#b0d4e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7fb3d0" stop-opacity="0"/>
    </radialGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .err-wobble {
          animation: err-wobble 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) 1 both;
          transform-origin: 100px 140px;
        }
        @keyframes err-wobble {
          0%, 100% { transform: rotate(0deg); }
          20%       { transform: rotate(-4deg); }
          40%       { transform: rotate(4deg); }
          60%       { transform: rotate(-3deg); }
          80%       { transform: rotate(2deg); }
        }
        .err-sweat {
          animation: err-sweat 2.2s ease-in-out infinite 0.6s;
          transform-origin: 148px 108px;
        }
        @keyframes err-sweat {
          0%, 70%  { transform: translateY(0px); opacity: 0.7; }
          100%     { transform: translateY(12px); opacity: 0; }
        }
      }
    </style>
  </defs>

  <!-- Ground shadow — slightly larger (slumped posture) -->
  <ellipse cx="100" cy="252" rx="44" ry="9" fill="#1a1a2e" opacity="0.28"/>

  <g class="err-wobble">
    <!-- Body — slightly darker tint for distress -->
    <rect x="30" y="56" width="140" height="152" rx="54" ry="54" fill="#6da3c0"/>
    <rect x="30" y="56" width="140" height="152" rx="54" ry="54" fill="url(#err-sheen)"/>
    <ellipse cx="130" cy="178" rx="44" ry="30" fill="#4e8aad" opacity="0.28" transform="rotate(-8 130 178)"/>

    <!-- Error indicator — small red exclamation on forehead -->
    <circle cx="100" cy="68" r="10" fill="#f87171" opacity="0.88"/>
    <rect x="97.5" y="62" width="5" height="7" rx="2.5" fill="#ffffff"/>
    <circle cx="100" cy="72" r="2" fill="#ffffff"/>

    <!-- Left eye — x-eyes (confused/alarmed) -->
    <!-- X cross left eye -->
    <ellipse cx="76" cy="112" rx="16" ry="18" fill="#f2f0ee"/>
    <line x1="68" y1="104" x2="84" y2="120" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="84" y1="104" x2="68" y2="120" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Right eye — wide alarmed -->
    <ellipse cx="124" cy="112" rx="16" ry="18" fill="#f2f0ee"/>
    <circle cx="124" cy="112" r="9" fill="#1a1a2e"/>
    <circle cx="127" cy="108" r="3.5" fill="#ffffff" opacity="0.88"/>

    <!-- Sweat drop — right side of head -->
    <ellipse class="err-sweat" cx="148" cy="104" rx="5" ry="8" fill="#9ad0e8" opacity="0.7"/>
    <path class="err-sweat" d="M 143 104 Q 148 96 153 104" fill="#9ad0e8" opacity="0.7"/>

    <!-- Mouth — concerned zigzag frown -->
    <path d="M 80 150 Q 86 144 92 150 Q 98 156 104 150 Q 110 144 116 150 Q 122 156 120 152"
          stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.62"/>

    <!-- Left arm — raised in alarm / "oh no" gesture -->
    <ellipse cx="24" cy="138" rx="14" ry="22" fill="#5e9ab8" transform="rotate(25 24 138)"/>
    <!-- Right arm — raised same -->
    <ellipse cx="176" cy="138" rx="14" ry="22" fill="#5e9ab8" transform="rotate(-25 176 138)"/>

    <!-- Feet — pigeon-toed/nervous -->
    <ellipse cx="82" cy="215" rx="22" ry="11" fill="#5e9ab8" transform="rotate(10 82 215)"/>
    <ellipse cx="118" cy="215" rx="22" ry="11" fill="#5e9ab8" transform="rotate(-10 118 215)"/>
  </g>
</svg>
