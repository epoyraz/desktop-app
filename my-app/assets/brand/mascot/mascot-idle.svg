<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 240"
  width="200"
  height="240"
  role="img"
  aria-label="Companion mascot — idle pose"
>
  <title>Companion — Idle</title>

  <defs>
    <radialGradient id="idle-sheen" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#b0d4e8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7fb3d0" stop-opacity="0"/>
    </radialGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .idle-float {
          animation: idle-float 3s ease-in-out infinite;
          transform-origin: 100px 120px;
        }
        @keyframes idle-float {
          0%, 100% { transform: translateY(0px); }
          50%       { transform: translateY(-6px); }
        }
        .idle-shadow {
          animation: idle-shadow 3s ease-in-out infinite;
          transform-origin: 100px 232px;
        }
        @keyframes idle-shadow {
          0%, 100% { transform: scaleX(1);   opacity: 0.32; }
          50%       { transform: scaleX(0.82); opacity: 0.20; }
        }
        .idle-blink-l {
          transform-origin: 76px 104px;
          animation: blink-l 5s ease-in-out infinite;
        }
        .idle-blink-r {
          transform-origin: 124px 104px;
          animation: blink-r 5s ease-in-out infinite;
        }
        @keyframes blink-l {
          0%, 88%, 96%, 100% { transform: scaleY(0); }
          92%                 { transform: scaleY(1); }
        }
        @keyframes blink-r {
          0%, 88%, 96%, 100% { transform: scaleY(0); }
          92%                 { transform: scaleY(1); }
        }
      }
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse class="idle-shadow" cx="100" cy="232" rx="42" ry="9" fill="#1a1a2e" opacity="0.32"/>

  <g class="idle-float">
    <!-- Body -->
    <rect x="30" y="44" width="140" height="152" rx="54" ry="54" fill="#7fb3d0"/>

    <!-- Sheen -->
    <rect x="30" y="44" width="140" height="152" rx="54" ry="54" fill="url(#idle-sheen)"/>

    <!-- Shadow tone — bottom right -->
    <ellipse cx="130" cy="168" rx="44" ry="30" fill="#5a9abf" opacity="0.28" transform="rotate(-8 130 168)"/>

    <!-- Left eye white -->
    <ellipse cx="76" cy="104" rx="16" ry="18" fill="#f2f0ee"/>
    <!-- Right eye white -->
    <ellipse cx="124" cy="104" rx="16" ry="18" fill="#f2f0ee"/>

    <!-- Pupils -->
    <circle cx="79" cy="107" r="9" fill="#1a1a2e"/>
    <circle cx="127" cy="107" r="9" fill="#1a1a2e"/>

    <!-- Eye shines -->
    <circle cx="82" cy="103" r="3.5" fill="#ffffff" opacity="0.88"/>
    <circle cx="130" cy="103" r="3.5" fill="#ffffff" opacity="0.88"/>

    <!-- Blink overlays -->
    <ellipse class="idle-blink-l" cx="76" cy="104" rx="17" ry="19" fill="#7fb3d0"/>
    <ellipse class="idle-blink-r" cx="124" cy="104" rx="17" ry="19" fill="#7fb3d0"/>

    <!-- Smile — gentle upward arc -->
    <path d="M 82 134 Q 100 152 118 134" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.62"/>

    <!-- Left arm -->
    <ellipse cx="28" cy="148" rx="14" ry="22" fill="#6aa8c8" transform="rotate(14 28 148)"/>
    <!-- Right arm -->
    <ellipse cx="172" cy="148" rx="14" ry="22" fill="#6aa8c8" transform="rotate(-14 172 148)"/>

    <!-- Left foot -->
    <ellipse cx="78" cy="202" rx="22" ry="11" fill="#6aa8c8"/>
    <!-- Right foot -->
    <ellipse cx="122" cy="202" rx="22" ry="11" fill="#6aa8c8"/>
  </g>
</svg>
