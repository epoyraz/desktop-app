name: QA

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci

      - name: Lint
        working-directory: my-app
        run: npm run lint

      - name: Type check
        working-directory: my-app
        run: npx tsc --noEmit

      - name: Unit + integration tests
        working-directory: my-app
        run: npm run test

      - name: Build (skip signing)
        working-directory: my-app
        run: npm run package -- --skip-signing
        continue-on-error: true

      - name: Playwright-Electron regression
        working-directory: my-app
        run: npx playwright test tests/regression/

      - name: Visual capture
        working-directory: my-app
        run: npm run visual:capture
        continue-on-error: true

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts
          path: |
            my-app/tests/visual/captures/
            my-app/tests/visual/diff/
            my-app/out/
          if-no-files-found: ignore
